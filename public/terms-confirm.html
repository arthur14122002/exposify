<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedingungen bestätigen – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard" style="max-width:620px;">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<h1 style="margin-bottom:12px;">Bevor du fortfährst</h1>

<p style="margin-bottom:24px; line-height:1.7; color:#4b5563;">
Bitte bestätige die folgenden Punkte, bevor du mit dem Kauf fortfährst.
</p>

<div id="selectedPlanBox" style="
margin-bottom:22px;
padding:14px 16px;
border:1px solid #dbeafe;
background:#eff6ff;
border-radius:12px;
font-size:14px;
font-weight:600;
color:#1e3a8a;
">
Gewähltes Modell: wird geladen...
</div>

<div style="
width:100%;
max-width:520px;
margin:0 auto 24px auto;
display:flex;
flex-direction:column;
gap:18px;
text-align:left;
">

<label style="
width:100%;
display:flex;
align-items:flex-start;
justify-content:flex-start;
gap:12px;
line-height:1.6;
cursor:pointer;
text-align:left;
">
<input
type="checkbox"
id="confirmBusiness"
style="
margin-top:3px;
flex:0 0 auto;
width:18px;
height:18px;
"
>
<span style="display:block; flex:1;">
Ich bestätige, dass ich als Unternehmer gemäß § 14 BGB handle.
</span>
</label>

<label style="
width:100%;
display:flex;
align-items:flex-start;
justify-content:flex-start;
gap:12px;
line-height:1.6;
cursor:pointer;
text-align:left;
">
<input
type="checkbox"
id="confirmAGB"
style="
margin-top:3px;
flex:0 0 auto;
width:18px;
height:18px;
"
>
<span style="display:block; flex:1;">
Ich akzeptiere die <a href="/agb.html" target="_blank">AGB</a>.
</span>
</label>

</div>

<button type="button" id="continueBtn" disabled style="opacity:0.55; cursor:not-allowed;">
Weiter
</button>

<p style="margin-top:18px; font-size:13px; color:#6b7280; line-height:1.6;">
Mit dem Fortfahren bestätigst du die oben genannten Angaben für den nächsten Kaufvorgang.
</p>
</div>

<footer class="footer">
<a href="/support.html">Support</a>
<a href="/impressum.html">Impressum</a>

<div class="footerDropdown">
<button type="button" class="footerDropdownToggle" onclick="toggleLegalMenu()">
Rechtliches <span id="legalArrow">▾</span>
</button>

<div id="legalMenu" class="footerDropdownMenu hidden">
<a href="/agb.html">AGB</a>
<a href="/datenschutz.html">Datenschutz</a>
<a href="/widerruf.html">Widerruf</a>
</div>
</div>
</footer>

<script>
const confirmBusiness = document.getElementById("confirmBusiness");
const confirmAGB = document.getElementById("confirmAGB");
const continueBtn = document.getElementById("continueBtn");
const selectedPlanBox = document.getElementById("selectedPlanBox");

function getSelectedPlanLabel(plan) {
if (plan === "pro") return "Exposify Pro – 34,99 € / Monat";
if (plan === "single") return "Einzelnes Exposé – 4,99 € einmalig";
return "Kein Modell ausgewählt";
}

function updateContinueState() {
const enabled = confirmBusiness. checked && confirmAGB.checked;
continueBtn.disabled = !enabled;
continueBtn.style.opacity = enabled ? "1" : "0.55";
continueBtn.style.cursor = enabled ? "pointer" : "not-allowed";
}

async function startCheckoutDirect(plan) {
try {
const res = await fetch("/create-checkout-session", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ plan })
});

const data = await res.json();

if (data.success && data.url) {
window.location.href = data.url;
return;
}

alert(data.message || "Checkout konnte nicht gestartet werden.");
} catch (error) {
console.error(error);
alert("Checkout konnte nicht gestartet werden.");
}
}

async function continueFlow() {
const selectedPlan = localStorage.getItem("selectedPlan") || "";

if (selectedPlan !== "pro" && selectedPlan !== "single") {
alert("Kein gültiges Modell ausgewählt.");
window.location.href = "/pricing.html";
return;
}

localStorage.setItem("termsConfirmed", "true");
localStorage.setItem("pendingCheckout", "true");

try {
const authRes = await fetch("/auth/status");
const authData = await authRes.json();

if (authData.loggedIn) {
await startCheckoutDirect(selectedPlan);
return;
}

window.location.href = "/register.html";
} catch (error) {
console.error(error);
window.location.href = "/register.html";
}
}

window.addEventListener("DOMContentLoaded", () => {
const selectedPlan = localStorage.getItem("selectedPlan") || "";
selectedPlanBox.textContent = `Gewähltes Modell: ${getSelectedPlanLabel(selectedPlan)}`;

if (selectedPlan !== "pro" && selectedPlan !== "single") {
alert("Bitte wähle zuerst ein Modell aus.");
window.location.href = "/pricing.html";
return;
}

confirmBusiness.addEventListener("change", updateContinueState);
confirmAGB.addEventListener("change", updateContinueState);
continueBtn.addEventListener("click", continueFlow);

updateContinueState();
});
</script>

<script>
function toggleLegalMenu() {
const menu = document.getElementById("legalMenu");
const arrow = document.getElementById("legalArrow");

if (!menu || !arrow) return;

menu.classList.toggle("hidden");
arrow.textContent = menu.classList.contains("hidden") ? "▾" : "▴";
}

document.addEventListener("click", function (e) {
const dropdown = document.querySelector(".footerDropdown");
const menu = document.getElementById("legalMenu");
const arrow = document.getElementById("legalArrow");

if (!dropdown || !menu || !arrow) return;

if (!dropdown.contains(e.target)) {
menu.classList.add("hidden");
arrow.textContent = "▾";
}
});
</script>

</body>
</html>
