<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">

<title>Neues Passwort – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<h1>Neues Passwort</h1>

<p id="infoText" style="margin-bottom:18px;">
Bitte gib dein neues Passwort ein.
</p>

<input id="password" type="password" placeholder="Neues Passwort">
<p id="passwordHint" style="display:none; margin-top:8px; margin-bottom:12px; font-size:13px; color:#dc2626;">
Passwort muss mindestens 8 Zeichen enthalten und mindestens eine Zahl haben.
</p>

<input id="confirmPassword" type="password" placeholder="Passwort bestätigen">
<p id="confirmPasswordHint" style="display:none; margin-top:8px; margin-bottom:0; font-size:13px; color:#dc2626;">
Die Passwörter stimmen nicht überein.
</p>

<button type="button" onclick="resetPassword()">Passwort speichern</button>

<p style="margin-top:18px;">
<a href="/login.html">Zurück zum Login</a>
</p>
</div>

<div id="authNoticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="authNoticeText">Hinweis</p>
<button type="button" id="authNoticeOk">OK</button>
</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

const authNoticeModal = document.getElementById("authNoticeModal");
const authNoticeText = document.getElementById("authNoticeText");
const authNoticeOk = document.getElementById("authNoticeOk");

if (authNoticeOk) {
authNoticeOk.addEventListener("click", () => {
authNoticeModal.classList.add("hidden");
});
}

function showAuthNotice(message) {
if (!authNoticeModal || !authNoticeText) return;
authNoticeText.textContent = message;
authNoticeModal.classList.remove("hidden");
}

function isPasswordValid(password) {
return password.length >= 8 && /\d/.test(password);
}

function updatePasswordValidation() {
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirmPassword");
const passwordHint = document.getElementById("passwordHint");
const confirmPasswordHint = document.getElementById("confirmPasswordHint");

if (!passwordInput || !confirmPasswordInput || !passwordHint || !confirmPasswordHint) return;

const password = passwordInput.value.trim();
const confirmPassword = confirmPasswordInput.value.trim();

if (password === "") {
passwordInput.style.borderColor = "";
passwordHint.style.display = "none";
} else if (isPasswordValid(password)) {
passwordInput.style.borderColor = "";
passwordHint.style.display = "none";
} else {
passwordInput.style.borderColor = "#dc2626";
passwordHint.style.display = "block";
}

if (confirmPassword === "") {
confirmPasswordInput.style.borderColor = "";
confirmPasswordHint.style.display = "none";
} else if (password === confirmPassword) {
confirmPasswordInput.style.borderColor = "";
confirmPasswordHint.style.display = "none";
} else {
confirmPasswordInput.style.borderColor = "#dc2626";
confirmPasswordHint.style.display = "block";
}
}

async function resetPassword() {
const password = document.getElementById("password").value.trim();
const confirmPassword = document.getElementById("confirmPassword").value.trim();

if (!token) {
showAuthNotice("Ungültiger oder fehlender Reset-Link.");
return;
}

if (!password || !confirmPassword) {
showAuthNotice("Bitte fülle beide Passwortfelder aus.");
return;
}

if (!isPasswordValid(password)) {
updatePasswordValidation();
showAuthNotice("Passwort muss mindestens 8 Zeichen enthalten und mindestens eine Zahl haben.");
return;
}

if (password !== confirmPassword) {
updatePasswordValidation();
showAuthNotice("Die Passwörter stimmen nicht überein.");
return;
}

try {
const res = await fetch("/reset-password", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ token, password })
});

const data = await res.json();

if (data.success) {
window.location.href = "/login.html";
} else {
showAuthNotice(data.message || "Passwort konnte nicht gespeichert werden.");
}
} catch (error) {
console.error(error);
showAuthNotice("Passwort konnte nicht gespeichert werden.");
}
}

document.getElementById("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") resetPassword();
});

document.getElementById("confirmPassword").addEventListener("keydown", (e) => {
if (e.key === "Enter") resetPassword();
});

document.getElementById("password").addEventListener("input", updatePasswordValidation);
document.getElementById("password").addEventListener("blur", updatePasswordValidation);

document.getElementById("confirmPassword").addEventListener("input", updatePasswordValidation);
document.getElementById("confirmPassword").addEventListener("blur", updatePasswordValidation);
</script>

<footer class="footer">
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
<a href="/agb.html">AGB</a>
</footer>

</body>
</html>
