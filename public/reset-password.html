<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">

<title>Neues Passwort – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<h1>Neues Passwort</h1>

<p id="infoText" style="margin-bottom:18px;">
Bitte geben Sie Ihr neues Passwort ein.
</p>

<input id="password" type="password" placeholder="Neues Passwort">
<input id="confirmPassword" type="password" placeholder="Passwort bestätigen">

<button type="button" onclick="resetPassword()">Passwort speichern</button>

<p style="margin-top:18px;">
<a href="/login.html">Zurück zum Login</a>
</p>
</div>

<div id="authNoticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="authNoticeText">Hinweis</p>
<button type="button" id="authNoticeOk">OK</button>
</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

const authNoticeModal = document.getElementById("authNoticeModal");
const authNoticeText = document.getElementById("authNoticeText");
const authNoticeOk = document.getElementById("authNoticeOk");

if (authNoticeOk) {
authNoticeOk.addEventListener("click", () => {
authNoticeModal.classList.add("hidden");
});
}

function showAuthNotice(message) {
if (!authNoticeModal || !authNoticeText) return;
authNoticeText.textContent = message;
authNoticeModal.classList.remove("hidden");
}

async function resetPassword() {
const password = document.getElementById("password").value.trim();
const confirmPassword = document.getElementById("confirmPassword").value.trim();

if (!token) {
showAuthNotice("Ungültiger oder fehlender Reset-Link.");
return;
}

if (!password || !confirmPassword) {
showAuthNotice("Bitte füllen Sie beide Passwortfelder aus.");
return;
}

if (password !== confirmPassword) {
showAuthNotice("Die Passwörter stimmen nicht überein.");
return;
}

if (password.length < 6) {
showAuthNotice("Das Passwort muss mindestens 6 Zeichen lang sein.");
return;
}

try {
const res = await fetch("/reset-password", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ token, password })
});

const data = await res.json();

if (data.success) {
window.location.href = "/login.html";
} else {
showAuthNotice(data.message || "Passwort konnte nicht gespeichert werden.");
}
} catch (error) {
console.error(error);
showAuthNotice("Passwort konnte nicht gespeichert werden.");
}
}

document.getElementById("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") resetPassword();
});

document.getElementById("confirmPassword").addEventListener("keydown", (e) => {
if (e.key === "Enter") resetPassword();
});
</script>

<footer class="footer">
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
</footer>

</body>
</html>
