<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahlung erfolgreich – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body style="min-height:100vh; display:flex; flex-direction:column;">

<div class="landing" style="flex:1; display:flex; align-items:center; justify-content:center;">
<section class="hero" style="width:100%; padding:80px 20px 40px 20px;">
<div class="heroContent" style="max-width:900px; margin:0 auto; text-align:center;">

<h1 style="margin-bottom:28px;">Zahlung erfolgreich</h1>

<p class="heroSub" style="max-width:720px; margin:0 auto 40px auto; font-size:22px; line-height:1.7;">
Dein Zugang wurde erfolgreich aktiviert. Du kannst jetzt direkt mit Exposify starten um Exposés erstellen und bearbeiten zu können.
</p>

<div class="heroButtons" style="display:flex; justify-content:center; gap:18px; flex-wrap:wrap; margin-top:10px;">
<button class="primaryBtn" onclick="goToApp()">Zur App</button>
<button class="secondaryBtn" onclick="goToDashboard()">Meine Projekte</button>
</div>

</div>
</section>
</div>

<footer class="footer">
<a href="/support.html">Support</a>
<a href="/impressum.html">Impressum</a>

<div class="footerDropdown">
<button type="button" class="footerDropdownToggle" onclick="toggleLegalMenu()">
Rechtliches <span id="legalArrow">▾</span>
</button>

<div id="legalMenu" class="footerDropdownMenu hidden">
<a href="/agb.html">AGB</a>
<a href="/datenschutz.html">Datenschutz</a>
<a href="/widerruf.html">Widerruf</a>
</div>
</div>
</footer>

<script>
localStorage.removeItem("selectedPlan");
localStorage.removeItem("pendingCheckout");
localStorage.removeItem("termsConfirmed");

function goToApp() {
window.location.href = "/app";
}

function goToDashboard() {
window.location.href = "/dashboard.html";
}
</script>

<script>
function toggleLegalMenu() {
const menu = document.getElementById("legalMenu");
const arrow = document.getElementById("legalArrow");

if (!menu || !arrow) return;

menu.classList.toggle("hidden");
arrow.textContent = menu.classList.contains("hidden") ? "▾" : "▴";
}

document.addEventListener("click", function (e) {
const dropdown = document.querySelector(".footerDropdown");
const menu = document.getElementById("legalMenu");
const arrow = document.getElementById("legalArrow");

if (!dropdown || !menu || !arrow) return;

if (!dropdown.contains(e.target)) {
menu.classList.add("hidden");
arrow.textContent = "▾";
}
});
</script>

</body>
</html>
