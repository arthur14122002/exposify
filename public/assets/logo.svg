<svg width="260" height="80" viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">

<defs>
<linearGradient id="eGradient" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#60a5fa"/>
<stop offset="50%" stop-color="#3b82f6"/>
<stop offset="100%" stop-color="#1d4ed8"/>
</linearGradient>

<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="2.2" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>

<rect width="260" height="80" fill="none"/>

<!-- E -->
<text x="30" y="55"
font-family="Inter, Arial, sans-serif"
font-size="40"
font-weight="800"
fill="url(#eGradient)"
filter="url(#glow)">E</text>

<!-- Dach (JETZT VORNE) -->
<polygon points="30,28 45,13 60,28"
fill="url(#eGradient)"
filter="url(#glow)"/>

<!-- Exposify Schrift -->
<text x="80" y="50"
font-family="Inter, Arial, sans-serif"
font-size="30"
font-weight="700"
fill="#111827">
Exposify
</text>

</svg>
