<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">

<title>Login – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<h1>Login</h1>

<input id="email" type="email" placeholder="E-Mail">
<input id="password" type="password" placeholder="Passwort">

<button type="button" onclick="login()">Login</button>

<p style="margin-top:14px; margin-bottom:10px;">
<a href="/forgot-password.html">Passwort vergessen?</a>
</p>

<p>Noch kein Konto?</p>
<a href="/register.html">Registrieren</a>
</div>

<div id="authNoticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="authNoticeText">Hinweis</p>
<button type="button" id="authNoticeOk">OK</button>
</div>
</div>

<script>
function setupWelcomeEligibility() {
const params = new URLSearchParams(window.location.search);
const verified = params.get("verified");

if (verified === "success") {
sessionStorage.setItem("showWelcomeAfterLogin", "true");
}
}

const authNoticeModal = document.getElementById("authNoticeModal");
const authNoticeText = document.getElementById("authNoticeText");
const authNoticeOk = document.getElementById("authNoticeOk");

async function checkAuthStatus() {
try {
const res = await fetch("/auth/status");
const data = await res.json();

if (data.loggedIn) {
const selectedPlan = localStorage.getItem("selectedPlan") || "";

if (selectedPlan === "pro" || selectedPlan === "single") {
window.location.href = `/pricing.html?continue=${selectedPlan}`;
} else {
window.location.href = "/";
}
}
} catch (error) {
console.error("Auth check failed:", error);
}
}

function closeAllModals() {
document.querySelectorAll(".modalOverlay").forEach((modal) => {
if (!modal.classList.contains("hidden")) {
modal.classList.add("hidden");
modal.style.display = "none";
}
});
}

document.addEventListener("keydown", (e) => {
if (e.key === "Enter") {
const openModal = document.querySelector(".modalOverlay:not(.hidden)");

if (openModal) {
e.preventDefault();
closeAllModals();
}
}
});

if (authNoticeOk) {
authNoticeOk.addEventListener("click", () => {
authNoticeModal.classList.add("hidden");
authNoticeModal.style.display = "none";
});
}

function showAuthNotice(message) {
if (!authNoticeModal || !authNoticeText) return;
authNoticeText.textContent = message;
authNoticeModal.classList.remove("hidden");
authNoticeModal.style.display = "flex";
}

async function login() {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

try {
const res = await fetch("/login", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ email, password })
});

const data = await res.json();

if (data.success) {
const shouldShowAfterLogin = sessionStorage.getItem("showWelcomeAfterLogin") === "true";
const welcomeShown = localStorage.getItem("welcomeShown") === "true";

if (shouldShowAfterLogin && !welcomeShown) {
sessionStorage.removeItem("showWelcomeAfterLogin");
window.location.href = "/?welcome=1";
return;
}

window.location.href = "/";
} else {
showAuthNotice(data.message || "Login fehlgeschlagen.");
}
} catch (error) {
console.error(error);
showAuthNotice("Login fehlgeschlagen.");
}
}

document.getElementById("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") login();
});

document.getElementById("email").addEventListener("keydown", (e) => {
if (e.key === "Enter") login();
});

window.addEventListener("DOMContentLoaded", () => {
setupWelcomeEligibility();
checkAuthStatus();
});
</script>

<footer class="footer">
<a href="/support.html">Support</a>
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
</footer>

</body>
</html>
