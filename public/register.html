<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Registrieren – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<h1>Registrieren</h1>

<input id="email" type="email" placeholder="E-Mail">
<input id="password" type="password" placeholder="Passwort">

<button type="button" onclick="register()">Konto erstellen</button>

<p>Schon registriert?</p>
<a href="/login.html">Zum Login</a>
</div>

<div id="authNoticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="authNoticeText">Hinweis</p>

<div style="display:flex; gap:10px; justify-content:center;">
<button type="button" id="authNoticeOk">OK</button>
<button type="button" id="resendBtn" style="display:none;">Erneut senden</button>
</div>
</div>
</div>

<script>
const authNoticeModal = document.getElementById("authNoticeModal");
const authNoticeText = document.getElementById("authNoticeText");
const authNoticeOk = document.getElementById("authNoticeOk");
const resendBtn = document.getElementById("resendBtn");

if (resendBtn) {
resendBtn.addEventListener("click", async () => {
const email = document.getElementById("email").value.trim();

if (!email) {
showAuthNotice("Bitte geben Sie zuerst Ihre E-Mail-Adresse ein.");
return;
}

try {
const res = await fetch("/resend-confirmation", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ email })
});

const data = await res.json();

if (data.success) {
showAuthNotice(
`Die Bestätigungs-E-Mail wurde erneut an ${email} gesendet.`,
true
);
} else {
showAuthNotice(data.message || "E-Mail konnte nicht erneut gesendet werden.", true);
}
} catch (error) {
console.error(error);
showAuthNotice("E-Mail konnte nicht erneut gesendet werden.", true);
}
});
}

if (authNoticeOk) {
authNoticeOk.addEventListener("click", () => {
authNoticeModal.classList.add("hidden");

// 🔥 Nach Bestätigung direkt zum Login
window.location.href = "/login.html";
});
}

function showAuthNotice(message, showResend = false) {
if (!authNoticeModal || !authNoticeText) return;

authNoticeText.textContent = message;
authNoticeModal.classList.remove("hidden");

const resendBtn = document.getElementById("resendBtn");

if (resendBtn) {
resendBtn.style.display = showResend ? "block" : "none";
}
}

async function register() {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

try {
const res = await fetch("/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ email, password })
});

const data = await res.json();

if (data.success) {
showAuthNotice(
`Eine Bestätigungs-E-Mail wurde an ${email} gesendet.\n\nBitte bestätigen Sie Ihre E-Mail-Adresse, bevor Sie sich einloggen.`,
true
);
return;
}else {
let message = data.message || "Registrierung fehlgeschlagen.";

if (message.includes("invalid")) {
message = "Bitte geben Sie eine gültige E-Mail-Adresse ein.";
}

if (message.includes("rate limit")) {
message = "Es wurden gerade zu viele E-Mails angefordert. Bitte warten Sie einen Moment und versuchen Sie es dann erneut.";
}

showAuthNotice(message);
}
} catch (error) {
console.error(error);
showAuthNotice("Registrierung fehlgeschlagen.");
}
}

document.getElementById("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") register();
});

document.getElementById("email").addEventListener("keydown", (e) => {
if (e.key === "Enter") register();
});
</script>

<footer class="footer">
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
</footer>

</body>
</html>
