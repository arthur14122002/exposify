<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

 <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">

<title>Registrieren – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<div id="authNoticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="authNoticeText">Hinweis</p>
<button type="button" id="authNoticeOk">OK</button>
</div>
</div>

<h1>Registrieren</h1>

<input id="email" type="email" placeholder="E-Mail">
<input id="password" type="password" placeholder="Passwort">
<p id="passwordHint" style="display:none; margin-top:8px; margin-bottom:0; font-size:13px; color:#dc2626;">
Passwort muss mindestens 8 Zeichen enthalten und mindestens eine Zahl haben.
</p>

<button type="button" onclick="register()">Konto erstellen</button>

<p>Schon registriert?</p>
<a href="/login.html">Zum Login</a>
</div>

<script>
const authNoticeModal = document.getElementById("authNoticeModal");
const authNoticeText = document.getElementById("authNoticeText");
const authNoticeOk = document.getElementById("authNoticeOk");

function closeAllModals() {
document.querySelectorAll(".modalOverlay").forEach((modal) => {
if (!modal.classList.contains("hidden")) {
modal.classList.add("hidden");
modal.style.display = "none";
}
});
}

function isModalOpen() {
return !!document.querySelector(".modalOverlay:not(.hidden)");
}

document.addEventListener("keydown", (e) => {
if (e.key === "Enter") {
const openModal = document.querySelector(".modalOverlay:not(.hidden)");

if (openModal) {
e.preventDefault();
e.stopPropagation();
closeAllModals();
}
}
});

if (authNoticeOk) {
authNoticeOk.addEventListener("click", () => {
authNoticeModal.classList.add("hidden");
authNoticeModal.style.display = "none";
});
}

function showAuthNotice(message) {
if (!authNoticeModal || !authNoticeText) return;
authNoticeText.textContent = message;
authNoticeModal.classList.remove("hidden");
authNoticeModal.style.display = "flex";
}

function isPasswordValid(password) {
return password.length >= 8 && /\d/.test(password);
}

function updatePasswordValidation() {
const passwordInput = document.getElementById("password");
const passwordHint = document.getElementById("passwordHint");
if (!passwordInput || !passwordHint) return;

const password = passwordInput.value.trim();

if (password === "") {
passwordInput.style.borderColor = "";
passwordHint.style.display = "none";
return;
}

if (isPasswordValid(password)) {
passwordInput.style.borderColor = "";
passwordHint.style.display = "none";
} else {
passwordInput.style.borderColor = "#dc2626";
passwordHint.style.display = "block";
}
}

async function register() {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if (!isPasswordValid(password)) {
updatePasswordValidation();
showAuthNotice("Passwort muss mindestens 8 Zeichen enthalten und mindestens eine Zahl haben.");
return;
}

try {
const res = await fetch("/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ email, password })
});

const data = await res.json();

if (data.success) {
window.location.href = `/check-email.html?email=${encodeURIComponent(email)}`;
return;
} else {
let message = data.message || "Registrierung fehlgeschlagen.";

if (message.includes("invalid")) {
message = "Bitte gib eine gültige E-Mail-Adresse ein.";
}

if (message.includes("rate limit")) {
message = "Es wurden gerade zu viele E-Mails angefordert. Bitte warte einen Moment und versuche es dann erneut.";
}

showAuthNotice(message);
}
} catch (error) {
console.error(error);
showAuthNotice("Registrierung fehlgeschlagen.");
}
}

document.getElementById("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") {
if (isModalOpen()) {
e.preventDefault();
return;
}
register();
}
});

document.getElementById("email").addEventListener("keydown", (e) => {
if (e.key === "Enter") {
if (isModalOpen()) {
e.preventDefault();
return;
}
register();
}
});

document.getElementById("password").addEventListener("input", updatePasswordValidation);
document.getElementById("password").addEventListener("blur", updatePasswordValidation);
</script>

<footer class="footer">
<a href="/support.html">Support</a>
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
</footer>

</body>
</html>
