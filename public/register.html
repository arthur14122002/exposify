<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

 <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">

<title>Registrieren – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<h1>Registrieren</h1>

<input id="email" type="email" placeholder="E-Mail">
<input id="password" type="password" placeholder="Passwort">

<button type="button" onclick="register()">Konto erstellen</button>

<p>Schon registriert?</p>
<a href="/login.html">Zum Login</a>
</div>

<script>

async function register() {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

try {
const res = await fetch("/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ email, password })
});

const data = await res.json();

if (data.success) {
window.location.href = `/check-email.html?email=${encodeURIComponent(email)}`;
return;
} else {
let message = data.message || "Registrierung fehlgeschlagen.";

if (message.includes("invalid")) {
message = "Bitte geben Sie eine gültige E-Mail-Adresse ein.";
}

if (message.includes("rate limit")) {
message = "Es wurden gerade zu viele E-Mails angefordert. Bitte warten Sie einen Moment und versuchen Sie es dann erneut.";
}

alert(message);
}
} catch (error) {
console.error(error);
alert("Registrierung fehlgeschlagen.");
}
}

document.getElementById("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") register();
});

document.getElementById("email").addEventListener("keydown", (e) => {
if (e.key === "Enter") register();
});
</script>

<footer class="footer">
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
</footer>

</body>
</html>
