<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Projekt ansehen – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="layout">

<div class="sidebar">
<div>
<div class="logoWrap">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<div class="sidebarTop">
<button type="button" onclick="goNew()">Neues Projekt</button>
<button type="button" onclick="goDashboard()">Meine Projekte</button>
</div>
</div>

<div class="sidebarBottom">
<button type="button" onclick="goLogin()">Anmelden</button>
<button type="button" onclick="logout()">Logout</button>

<div class="sidebarBottomLinks">
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
</div>

</div>
</div>

<div class="content">

<div class="pageTitleRow">
<h1>Projektansicht</h1>
</div>

<div class="viewerActions">
<button type="button" onclick="goDashboard()">Zurück zu Meine Projekte</button>
<button id="pdfBtn" type="button">PDF erstellen</button>
</div>

<div id="viewerContent" class="viewerCard">
Projekt wird geladen...
</div>

</div>
</div>

<div id="pdfLoadingOverlay" class="loadingOverlay hidden">
<div class="loadingBox">
<div class="spinner"></div>
<p>PDF wird erstellt...</p>
</div>
</div>

<div id="noticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="noticeModalText">Hinweis</p>
<button type="button" id="noticeModalOk">OK</button>
</div>
</div>

<script>
let currentProject = null;

const noticeModal = document.getElementById("noticeModal");
const noticeModalText = document.getElementById("noticeModalText");
const noticeModalOk = document.getElementById("noticeModalOk");

if (noticeModalOk) {
noticeModalOk.addEventListener("click", () => {
noticeModal.classList.add("hidden");
});
}

function showNotice(message) {
if (!noticeModal || !noticeModalText) return;
noticeModalText.textContent = message;
noticeModal.classList.remove("hidden");
}

function normalizeProjectContent(container) {
if (!container) return;

const pages = [...container.querySelectorAll(".viewerPageInner, .expose-page, .normalizedExpose")];
pages.forEach((page) => {
page.classList.add("normalizedExpose");
});

}

async function loadProject() {
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const container = document.getElementById("viewerContent");

if (!id) {
container.innerHTML = "Keine Projekt-ID gefunden.";
return;
}

try {
const res = await fetch(`/projects/${id}`);
const data = await res.json();

if (!res.ok) {
container.innerHTML = data.message || "Projekt konnte nicht geladen werden.";
return;
}

currentProject = data;

const rawHtml = data.html || "Kein Inhalt vorhanden.";

if (rawHtml.includes("editorPage")) {
container.innerHTML = rawHtml
.replaceAll("editorPageInner", "viewerPageInner")
.replaceAll("editorPage", "viewerPage");
} else {
container.innerHTML = `
<div class="viewerPage">
<div class="viewerPageInner">
${rawHtml}
</div>
</div>
`;
}

normalizeProjectContent(container);
} catch (error) {
console.error(error);
container.innerHTML = "Fehler beim Laden des Projekts.";
}
}

function showPdfLoading(show) {
const overlay = document.getElementById("pdfLoadingOverlay");
overlay.classList.toggle("hidden", !show);
overlay.style.display = show ? "flex" : "none";
}


async function createPdf() {
if (!currentProject) {
showNotice("Kein Projekt geladen.");
return;
}

showPdfLoading(true);

try {
const viewerContent = document.getElementById("viewerContent");
if (!viewerContent) {
showNotice("Projektansicht nicht gefunden.");
return;
}

const html = `
<html>
<head>
<meta charset="UTF-8">
<title>Exposé PDF</title>

<style>
${[...document.styleSheets]
.map(sheet => {
try {
return [...sheet.cssRules].map(rule => rule.cssText).join("\n");
} catch {
return "";
}
})
.join("\n")}

/* Nur wenige gezielte PDF-Regeln */
@page {
size: A4;
margin: 0;
}

html, body {
margin: 0 !important;
padding: 0 !important;
background: white !important;
}

#viewerContent {
width: 210mm !important;
margin: 0 !important;
padding: 0 !important;
background: white !important;
}

.viewerCard {
margin: 0 !important;
padding: 0 !important;
background: white !important;
border-radius: 0 !important;
box-shadow: none !important;
}

.viewerPage {
width: 210mm !important;
height: 297mm !important;
min-height: 297mm !important;
margin: 0 !important;
page-break-after: always !important;
break-after: page !important;
overflow: hidden !important;
box-sizing: border-box !important;
background: white !important;
}

.viewerPage:last-child {
page-break-after: auto !important;
break-after: auto !important;
}

.viewerPageInner {
width: 100% !important;
height: 100% !important;
min-height: 297mm !important;
margin: 0 !important;
padding: 40px 48px !important;
box-sizing: border-box !important;
overflow: hidden !important;
position: relative !important;
}

/* nur Top-Abstand des ersten Elements killen */
.viewerPageInner > *:first-child {
margin-top: 0 !important;
}

/* Überschrift etwas kräftiger */
.viewerPageInner h1 {
font-weight: 800 !important;
line-height: 1.15 !important;
}

.viewerPageInner h2 {
margin-top: 28px !important;
}

.viewerPageInner h3 {
margin-top: 19px !important;
}

/* Wichtig: Bildwrapper NICHT zerstören */
.editorImageWrapper {
position: absolute !important;
z-index: 5 !important;
overflow: hidden !important;
background: transparent !important;
}

.editorImageWrapper img {
width: 100% !important;
height: 100% !important;
max-width: none !important;
max-height: none !important;
object-fit: contain !important;
display: block !important;
}

.editorImageWrapper[style*="top: 2"] {
transform: translateY(2mm) !important;
}
</style>

</head>
<body>
${viewerContent.outerHTML}
</body>
</html>
`;

const res = await fetch("/pdf", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ html })
});

if (!res.ok) {
const data = await res.json().catch(() => ({}));
showNotice(data.message || "PDF konnte nicht erstellt werden.");
return;
}

const blob = await res.blob();
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "expose.pdf";
document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);
} catch (error) {
console.error(error);
showNotice("PDF konnte nicht erstellt werden.");
} finally {
showPdfLoading(false);
}
}



function goNew() {
window.location.href = "/";
}

function goDashboard() {
window.location.href = "/dashboard.html";
}

function goLogin() {
window.location.href = "/login.html";
}

async function logout() {
await fetch("/logout", { method: "POST" });
window.location.href = "/login.html";
}

document.getElementById("pdfBtn").addEventListener("click", createPdf);

loadProject();
</script>

</body>
</html>
