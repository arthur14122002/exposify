<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Projekt ansehen – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="layout">

<div class="sidebar">
<div>
<div class="logoWrap">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<div class="sidebarTop">
<button type="button" onclick="goNew()">Neues Projekt</button>
<button type="button" onclick="goDashboard()">Meine Projekte</button>
</div>
</div>

<div class="sidebarBottom">
<button type="button" onclick="goLogin()">Anmelden</button>
<button type="button" onclick="logout()">Logout</button>

<div class="sidebarBottomLinks">
<a href="/impressum.html">Impressum</a>
<a href="/datenschutz.html">Datenschutz</a>
</div>

</div>
</div>

<div class="content">

<div class="pageTitleRow">
<h1>Projektansicht</h1>
</div>

<div class="viewerActions">
<button type="button" onclick="goDashboard()">Zurück zu Meine Projekte</button>
<button id="pdfBtn" type="button">PDF erstellen</button>
</div>

<div id="viewerContent" class="viewerCard">
Projekt wird geladen...
</div>

</div>
</div>

<div id="pdfLoadingOverlay" class="loadingOverlay hidden">
<div class="loadingBox">
<div class="spinner"></div>
<p>PDF wird erstellt...</p>
</div>
</div>

<div id="noticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="noticeModalText">Hinweis</p>
<button type="button" id="noticeModalOk">OK</button>
</div>
</div>

<script>
let currentProject = null;

const noticeModal = document.getElementById("noticeModal");
const noticeModalText = document.getElementById("noticeModalText");
const noticeModalOk = document.getElementById("noticeModalOk");

if (noticeModalOk) {
noticeModalOk.addEventListener("click", () => {
noticeModal.classList.add("hidden");
});
}

function showNotice(message) {
if (!noticeModal || !noticeModalText) return;
noticeModalText.textContent = message;
noticeModal.classList.remove("hidden");
}

function normalizeProjectContent(container) {
if (!container) return;

const pages = [...container.querySelectorAll(".viewerPageInner, .expose-page, .normalizedExpose")];
pages.forEach((page) => {
page.classList.add("normalizedExpose");
});

}

async function loadProject() {
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const container = document.getElementById("viewerContent");

if (!id) {
container.innerHTML = "Keine Projekt-ID gefunden.";
return;
}

try {
const res = await fetch(`/projects/${id}`);
const data = await res.json();

if (!res.ok) {
container.innerHTML = data.message || "Projekt konnte nicht geladen werden.";
return;
}

currentProject = data;

const rawHtml = data.html || "Kein Inhalt vorhanden.";

if (rawHtml.includes("editorPage")) {
container.innerHTML = rawHtml
.replaceAll("editorPageInner", "viewerPageInner")
.replaceAll("editorPage", "viewerPage");
} else {
container.innerHTML = `
<div class="viewerPage">
<div class="viewerPageInner">
${rawHtml}
</div>
</div>
`;
}

normalizeProjectContent(container);
} catch (error) {
console.error(error);
container.innerHTML = "Fehler beim Laden des Projekts.";
}
}

function showPdfLoading(show) {
const overlay = document.getElementById("pdfLoadingOverlay");
overlay.classList.toggle("hidden", !show);
overlay.style.display = show ? "flex" : "none";
}

async function createPdf() {
if (!currentProject) {
showNotice("Kein Projekt geladen.");
return;
}

showPdfLoading(true);

try {
const viewerContent = document.getElementById("viewerContent");
if (!viewerContent) {
showNotice("Projektansicht nicht gefunden.");
return;
}

const pageNodes = [...viewerContent.querySelectorAll(".viewerPage")];

let pdfPagesHtml = "";

if (pageNodes.length) {
pdfPagesHtml = pageNodes.map((page) => {
const inner = page.querySelector(".viewerPageInner");
const content = inner ? inner.innerHTML : page.innerHTML;

return `
<div class="pdfPage">
<div class="pdfPageInner normalizedExpose">
${content}
</div>
</div>
`;
}).join("");
} else {
pdfPagesHtml = `
<div class="pdfPage">
<div class="pdfPageInner normalizedExpose">
${viewerContent.innerHTML}
</div>
</div>
`;
}

const html = `
<html>
<head>
<meta charset="UTF-8">
<title>Exposé PDF</title>
<style>
* {
box-sizing: border-box;
}

html, body {
margin: 0;
padding: 0;
font-family: Arial, sans-serif;
color: #111827;
background: white;
}

body {
-webkit-print-color-adjust: exact;
print-color-adjust: exact;
}

.pdfPage {
width: 794px;
height: 1123px;
page-break-after: always;
break-after: page;
background: white;
position: relative;
overflow: hidden;
}

.pdfPage:last-child {
page-break-after: auto;
break-after: auto;
}

.pdfPageInner {
position: relative;
width: 100%;
min-height: 1123px;
padding: 40px 48px;
box-sizing: border-box;
overflow: visible;
}
.normalizedExpose {
width: 100%;
box-sizing: border-box;
}

.normalizedExpose h1 {
font-size: 34px;
font-weight: 800;
margin: 0 0 10px;
}

.normalizedExpose h2 {
font-size: 24px;
font-weight: 700;
margin: 16px 0 8px;
}

.normalizedExpose h3 {
font-size: 18px;
font-weight: 700;
margin: 14px 0 6px;
}

.normalizedExpose p {
margin: 0 0 14px;
line-height: 1.45;
}

.normalizedExpose .editorPageInner,
.normalizedExpose .viewerPageInner,
.pdfPageInner {
line-height: 1.45;
}

.pdfPageInner p,
.pdfPageInner div {
margin: 0 0 1px;
line-height: 1.45;
}

.pdfPageInner h1 {
margin: 0 0 10px;
line-height: 1.2;
}

.pdfPageInner h2 {
margin: 16px 0 8px;
line-height: 1.25;
}

.pdfPageInner h3 {
margin: 14px 0 6px;
line-height: 1.3;
}

.pdfPageInner ul,
.pdfPageInner ol {
margin: 0 0 8px 22px;
line-height: 1.45;
}

.heroImage {
width: 100%;
height: 320px;
max-height: 320px;
object-fit: contain;
display: block;
background: white;
margin: 18px 0 24px;
page-break-inside: avoid;
break-inside: avoid;
}

.flowImageGrid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
margin: 18px 0 24px;
width: 100%;
page-break-inside: auto;
break-inside: auto;
}

.flowImageItem {
page-break-inside: avoid;
break-inside: avoid;
}

.flowImageItem img {
width: 100%;
height: 220px;
object-fit: contain;
display: block;
background: white;
}


.editorResizeHandle,
.editorSelected,
.editorImagePlaceholder {
display: none !important;
}

.pdfPageInner .editorImageWrapper {
position: absolute;
transform: translateY(3mm);
}

.editorImageWrapper img {
width: 100% !important;
height: 100% !important;
max-width: none !important;
max-height: none !important;
object-fit: contain !important;
display: block !important;
background: white;
}


.textBlock {
border: none;
background: transparent;
overflow: visible;
padding: 0;
min-height: 0;
margin: 18px 0;
}

.textBlockSelected {
border: none;
}

.textBlockResizeHandle {
display: none !important;
}

.textBlockInner {
width: 100%;
min-height: 0;
overflow: visible;
outline: none;
line-height: 1.5;
color: #111827;
}

.textBlockWidth25 {
width: 25%;
}

.textBlockWidth50 {
width: 50%;
}

.textBlockWidth75 {
width: 75%;
}

.textBlockWidth100 {
width: 100%;
}

@media print {
.flowImageGrid {
grid-template-columns: 1fr 1fr;
}

.flowImageItem img {
height: 220px;
}
}
</style>
</head>
<body>
${pdfPagesHtml}
</body>
</html>
`;

const res = await fetch("/pdf", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ html })
});

if (!res.ok) {
const data = await res.json().catch(() => ({}));
showNotice(data.message || "PDF konnte nicht erstellt werden.");
return;
}

const blob = await res.blob();
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "expose.pdf";
document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);
} catch (error) {
console.error(error);
showNotice("PDF konnte nicht erstellt werden.");
} finally {
showPdfLoading(false);
}
}

function goNew() {
window.location.href = "/";
}

function goDashboard() {
window.location.href = "/dashboard.html";
}

function goLogin() {
window.location.href = "/login.html";
}

async function logout() {
await fetch("/logout", { method: "POST" });
window.location.href = "/login.html";
}

document.getElementById("pdfBtn").addEventListener("click", createPdf);

loadProject();
</script>

</body>
</html>
