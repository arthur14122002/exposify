<!DOCTYPE html>

<head>

</head>
<body>

<div class="layout">

<aside class="sidebar">
<div>
<div class="logoWrap">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<div class="sidebarTop">
<button type="button" class="sidebarNavBtn" onclick="newProject()">
<span class="sidebarNavIcon" aria-hidden="true">
<svg viewBox="0 0 24 24" fill="none">
<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
</svg>
</span>
<span class="sidebarNavText">Neues Projekt</span>
</button>

<button type="button" class="sidebarNavBtn" onclick="loadProjects()">
<span class="sidebarNavIcon" aria-hidden="true">
<svg viewBox="0 0 24 24" fill="none">
<path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H9l2 2h7.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5v-9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
</svg>
</span>
<span class="sidebarNavText">Meine Projekte</span>
</button>

<button type="button" class="sidebarNavBtn" onclick="goToProfile()">
<span class="sidebarNavIcon" aria-hidden="true">
<svg viewBox="0 0 24 24" fill="none">
<circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="2"/>
<path d="M5 19c1.7-3.1 4.2-4.5 7-4.5s5.3 1.4 7 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg>
</span>
<span class="sidebarNavText">Mein Profil</span>
</button>
</div>
</div>

<div class="sidebarBottom">
<button type="button" class="sidebarNavBtn" onclick="goLogin()">
<span class="sidebarNavIcon" aria-hidden="true">
<svg viewBox="0 0 24 24" fill="none">
<path d="M10 7V5.8A2.8 2.8 0 0 1 12.8 3h4.4A2.8 2.8 0 0 1 20 5.8v12.4a2.8 2.8 0 0 1-2.8 2.8h-4.4A2.8 2.8 0 0 1 10 18.2V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
<path d="M4 12h10M10 8l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</span>
<span class="sidebarNavText">Anmelden</span>
</button>

<button type="button" class="sidebarNavBtn" onclick="logout()">
<span class="sidebarNavIcon" aria-hidden="true">
<svg viewBox="0 0 24 24" fill="none">
<path d="M10 7V5.8A2.8 2.8 0 0 0 7.2 3H4.8A2.8 2.8 0 0 0 2 5.8v12.4A2.8 2.8 0 0 0 4.8 21h2.4A2.8 2.8 0 0 0 10 18.2V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
<path d="M20 12H10M14 8l-4 4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</span>
<span class="sidebarNavText">Logout</span>
</button>

<div class="sidebarFooter">
<div class="sidebarFooterRow">
<a href="/impressum.html" class="sidebarFooterLink">Impressum</a>

<div class="sidebarDropdownInline">
<button type="button" class="sidebarFooterLink" onclick="toggleSidebarLegal()">
Rechtliches <span id="sidebarArrow">▾</span>
</button>

<div id="sidebarLegalMenu" class="sidebarLegalMenu hidden">
<a href="/agb.html">AGB</a>
<a href="/datenschutz.html">Datenschutz</a>
<a href="/widerruf.html">Widerruf</a>
</div>
</div>
</div>
</div>
</div>
</aside>

<div class="content">

<div class="pageTitleRow">
<h1>Meine Projekte</h1>
</div>

<div id="projectsList"></div>

</div>

</div>

<div id="deleteModal" class="modalOverlay hidden">
<div class="modalBox">
<p>Möchtest du dieses Exposé wirklich löschen?</p>
<div class="projectActions">
<button type="button" onclick="confirmDeleteProject()">Weiter</button>
<button type="button" onclick="closeDeleteModal()">Abbrechen</button>
</div>
</div>
</div>

<script>
let deleteProjectId = null;

async function loadProjects() {
const container = document.getElementById("projectsList");
container.innerHTML = "<div class='card'>Projekte werden geladen...</div>";

try {
const res = await fetch("/projects");
const data = await res.json();

if (!res.ok) {
container.innerHTML = `<div class="card">${data.message || "Bitte zuerst anmelden."}</div>`;
return;
}

if (!data.length) {
container.innerHTML = "<div class='card'>Noch keine Projekte vorhanden.</div>";
return;
}

container.innerHTML = "";

data.forEach((project) => {
const card = document.createElement("div");
card.className = "projectCard";

card.innerHTML = `
<h3>${project.title || "Unbenanntes Exposé"}</h3>
<p>Erstellt: ${new Date(project.createdAt).toLocaleString("de-DE")}</p>
<div class="projectActions">
<button type="button" onclick="viewProject('${project.id}')">Ansehen</button>
<button type="button" onclick="editProject('${project.id}')">Bearbeiten</button>
<button type="button" onclick="openDeleteModal('${project.id}')">Löschen</button>
</div>
`;

container.appendChild(card);
});
} catch (error) {
console.error(error);
container.innerHTML = "<div class='card'>Fehler beim Laden der Projekte.</div>";
}
}

function viewProject(id) {
window.location.href = `/viewer.html?id=${id}`;
}

function editProject(id) {
window.location.href = `/editor.html?id=${id}`;
}

function openDeleteModal(id) {
deleteProjectId = id;
document.getElementById("deleteModal").classList.remove("hidden");
}

function closeDeleteModal() {
deleteProjectId = null;
document.getElementById("deleteModal").classList.add("hidden");
}

async function confirmDeleteProject() {
if (!deleteProjectId) return;

try {
await fetch(`/projects/${deleteProjectId}`, {
method: "DELETE"
});

closeDeleteModal();
loadProjects();
} catch (error) {
console.error(error);
alert("Löschen fehlgeschlagen.");
}
}

function newProject() {
window.location.href = "/app";
}

function loadProjects() {
window.location.href = "/dashboard.html";
}

function goToProfile() {
window.location.href = "/profile.html";
}

function goNew() {
window.location.href = "/app";
}

function goDashboard() {
window.location.href = "/dashboard.html";
}

function goLogin() {
window.location.href = "/login.html";
}

async function logout() {
await fetch("/logout", { method: "POST" });
window.location.href = "/login.html";
}

loadProjects();
</script>

<script>
function toggleSidebarLegal() {
const menu = document.getElementById("sidebarLegalMenu");
const arrow = document.getElementById("sidebarArrow");

if (!menu || !arrow) return;

menu.classList.toggle("hidden");
arrow.textContent = menu.classList.contains("hidden") ? "▾" : "▴";
}
</script>

<script>
function goToProfile() {
window.location.href = "/profile.html";
}
</script>

</body>
</html>
