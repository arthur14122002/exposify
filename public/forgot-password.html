<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=21">
<link rel="shortcut icon" href="/favicon.png?v=21">
<link rel="apple-touch-icon" href="/favicon.png?v=21">

<title>Passwort vergessen – Exposify</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="authPage">

<div class="authCard">
<div class="authLogo">
<img src="/assets/logo.svg" alt="Exposify Logo">
</div>

<h1>Passwort vergessen</h1>

<p style="margin-bottom:18px;">
Gib deine E-Mail-Adresse ein. Wir senden dir einen Link zum Zurücksetzen deines Passworts.
</p>

<input id="email" type="email" placeholder="E-Mail">

<button type="button" onclick="sendResetLink()">Reset-Link senden</button>

<p style="margin-top:18px;">
<a href="/login.html">Zurück zum Login</a>
</p>
</div>

<div id="authNoticeModal" class="modalOverlay hidden">
<div class="modalBox">
<p id="authNoticeText">Hinweis</p>
<button type="button" id="authNoticeOk">OK</button>
</div>
</div>

<script>
const authNoticeModal = document.getElementById("authNoticeModal");
const authNoticeText = document.getElementById("authNoticeText");
const authNoticeOk = document.getElementById("authNoticeOk");

if (authNoticeOk) {
authNoticeOk.addEventListener("click", () => {
authNoticeModal.classList.add("hidden");
});
}

function showAuthNotice(message) {
if (!authNoticeModal || !authNoticeText) return;
authNoticeText.textContent = message;
authNoticeModal.classList.remove("hidden");
}

async function sendResetLink() {
const email = document.getElementById("email").value.trim();

try {
const res = await fetch("/forgot-password", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ email })
});

const data = await res.json();

if (data.success) {
window.location.href = `/check-reset-email.html?email=${encodeURIComponent(email)}`;
} else {
showAuthNotice(data.message || "Reset-Link konnte nicht gesendet werden.");
}
} catch (error) {
console.error(error);
showAuthNotice("Reset-Link konnte nicht gesendet werden.");
}
}

document.getElementById("email").addEventListener("keydown", (e) => {
if (e.key === "Enter") sendResetLink();
});
</script>

<footer class="footer">
<a href="/support.html">Support</a>
<a href="/impressum.html">Impressum</a>

<div class="footerDropdown">
<button type="button" class="footerDropdownToggle" onclick="toggleLegalMenu()">
Rechtliches <span id="legalArrow">▾</span>
</button>

<div id="legalMenu" class="footerDropdownMenu hidden">
<a href="/agb.html">AGB</a>
<a href="/datenschutz.html">Datenschutz</a>
<a href="/widerruf.html">Widerruf</a>
</div>
</div>
</footer>

<script>
function toggleLegalMenu() {
const menu = document.getElementById("legalMenu");
const arrow = document.getElementById("legalArrow");

if (!menu || !arrow) return;

menu.classList.toggle("hidden");
arrow.textContent = menu.classList.contains("hidden") ? "▾" : "▴";
}

document.addEventListener("click", function (e) {
const dropdown = document.querySelector(".footerDropdown");
const menu = document.getElementById("legalMenu");
const arrow = document.getElementById("legalArrow");

if (!dropdown || !menu || !arrow) return;

if (!dropdown.contains(e.target)) {
menu.classList.add("hidden");
arrow.textContent = "▾";
}
});
</script>

</body>
</html>
